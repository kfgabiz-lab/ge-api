# 환경 1: 개발마스터 — 로컬 PC + 로컬 DB
# Git Remote: ge / 공통 개발 결과물 공유용
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/bo
    username: postgres
    password: "1234"
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update   # 로컬 DB — 스키마 자동 반영
    properties:
      hibernate:
        format_sql: true
  mail:
    host: 10.153.2.44
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
# CORS — 로컬 FE 주소
cors:
  allowed-origins: "http://localhost:3002,http://localhost:3001"

# 파일 업로드 루트 경로
file:
  upload-root: "/uploads"

# 페이지 템플릿 TSX 파일 출력 경로
page-template:
  output-dir: "../bo/src/app/admin/generated"

# Slug Entity 코드 생성기 — 생성된 .java 파일을 실제로 기록할 소스 경로
# (bo-api 실행 워킹디렉토리 기준 상대경로, 즉 bo-api/ 자기 자신의 컴파일 대상 소스 디렉토리를 직접 가리킴)
# ⚠ local 프로파일에서만 사용 가능한 기능 — SlugEntityCodeGenerator/SlugEntityCodeWriter가 자체적으로 차단
codegen:
  entity:
    entity-dir: "src/main/java/com/ge/bo/entity"
    dto-dir: "src/main/java/com/ge/bo/dto"
    repository-dir: "src/main/java/com/ge/bo/repository"
    service-dir: "src/main/java/com/ge/bo/service"
    controller-dir: "src/main/java/com/ge/bo/controller"

# 로컬 전용 상세 로그 (운영 환경 노출 금지 — PII 보안)
logging:
  level:
    com.ge.bo: DEBUG
    org.springframework.security: DEBUG
    # SQL 파라미터 실제 값 출력
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # 트랜잭션 커밋/롤백 로그
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
    
ls:
  isApiLogin: false
  file-storage: local   # local, blob
  totp:
    isUser: "Ge Admin"
    enabled: false   # true = 2차인증 활성화 / false = 비밀번호만으로 로그인
  lse:
    inApi:
      connectPortalEncKey: LegacyConnectKeyText(!#@)2532!#@
      connectPortalIv: IV($&*)2516($&*)
    outApi:
      googleMapKey : "AIzaSyBkHvBn_MG-VWQd2C8-UA3PJBniWPy5QNk"
      recapchaKey : "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
