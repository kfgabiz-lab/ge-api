# 환경 1: 개발마스터 — 로컬 PC + 로컬 DB
# Git Remote: ge / 공통 개발 결과물 공유용
recaptcha:
  secret-key: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/bo
    username: postgres
    password: "1234"
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update   # 로컬 DB — 스키마 자동 반영
    properties:
      hibernate:
        format_sql: true
totp:
  issuer: "Ge Admin"
  enabled: false   # true = 2차인증 활성화 / false = 비밀번호만으로 로그인
# CORS — 로컬 FE 주소
cors:
  allowed-origins: "http://localhost:3002,http://localhost:3001"

# 파일 업로드 루트 경로
file:
  upload-root: "/uploads"

# 페이지 템플릿 TSX 파일 출력 경로
page-template:
  output-dir: "../bo/src/app/admin/generated"

# 로컬 전용 상세 로그 (운영 환경 노출 금지 — PII 보안)
logging:
  level:
    com.ge.bo: DEBUG
    org.springframework.security: DEBUG
    # SQL 파라미터 실제 값 출력
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # 트랜잭션 커밋/롤백 로그
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
