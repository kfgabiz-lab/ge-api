  servlet:
    session:
      cookie:
        secure: false

# CORS — 로컬 FE 주소 (각자 로컬에서 FE 실행)
cors:
  allowed-origins: "http://localhost:3002,http://localhost:3001"

# 파일 업로드 루트 경로
file:
  upload-root: "/uploads"

# 페이지 템플릿 TSX 파일 출력 경로
page-template:
  output-dir: "../bo/src/app/admin/generated"

# Slug Entity 코드 생성기 설정 — 이 기능은 local 프로파일에서만 동작하므로 developer 프로파일에서는 실사용되지 않는다.
# (앱 부팅 안전성을 위해 값만 명시. @Value 기본값이 있어 이 키가 없어도 부팅에는 문제 없음)
codegen:
  entity:
    entity-dir: "src/main/java/com/ge/bo/entity"
    dto-dir: "src/main/java/com/ge/bo/dto"
    repository-dir: "src/main/java/com/ge/bo/repository"
    service-dir: "src/main/java/com/ge/bo/service"
    controller-dir: "src/main/java/com/ge/bo/controller"

# 개발자 디버깅용 상세 로그
logging:
  level:
    com.ge.bo: DEBUG
    org.springframework.security: DEBUG
    # SQL 파라미터 실제 값 출력
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # 트랜잭션 커밋/롤백 로그
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG


