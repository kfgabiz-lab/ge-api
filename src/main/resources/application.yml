

spring:
  profiles:
    active: local   # ★ 실행 환경 선택 — local / developer / dev
  main:
    allow-bean-definition-overriding: true
  jackson:
    serialization:
      write-dates-as-timestamps: false  # LocalDateTime → ISO-8601 문자열로 직렬화
  servlet:
    multipart:
      max-file-size: 50MB       # 파일 1개 최대 크기
      max-request-size: 200MB   # 요청 전체 최대 크기
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# JWT 설정
app:
  jwt:
    secret: "bo-backoffice-ge-america-secret-key-256bit-secure-2026"
    expiration: 3600        # 1시간 (초)
    refresh-expiration: 604800  # 7일 (초)

# 로깅 기본 수준 (각 환경 yml에서 override 가능)
logging:
  level:
    root: WARN
    com.ge.bo: INFO


ls:
  isApiLogin: true
  totp:
    isUser: "LSE Admin"
    enabled: true   # true = 2차인증 활성화 / false = 비밀번호만으로 로그인
  lse:
    sso:
      baseUrl: https://lsesso.ls-electric.com/service
      sysName: NAHP          # SSO 시스템 코드
      defaultRole: PENDING_ADMIN      # SSO 자동 생성 계정 기본 역할
